<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Yannick Hamelryck</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>
  <header class="site-header">
    <div class="container nav-container">
      <a href="index.html" class="logo">Yannick Hamelryck</a>
      <nav class="nav">
        <a href="cv.html">CV</a>
        <a href="projects.html">Projects</a>
        <a href="blog.html">Blog</a>
        <a href="contact.html" class="active nav-button">Contact</a>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <section class="page-hero">
      <div class="container narrow">
        <p class="eyebrow">Contact</p>
        <h1>Get in touch</h1>
        <p class="page-text">
          Send a message using the form below.
        </p>

        <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="2e9cdcbe-225f-40b8-a542-155079565604">
          <input type="hidden" name="subject" value="New message from yannickhamelryck.be">
          <input type="hidden" name="from_name" value="Portfolio Contact Form">

          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required />
          </div>

          <div class="form-group">
            <label for="message">Your message</label>
            <textarea id="message" name="message" rows="7" placeholder="Write your message here..." required></textarea>
          </div>

          <button type="submit" class="btn btn-primary">Send</button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
